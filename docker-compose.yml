version: '3.8'

services:
  mysql-db:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: communitycartdb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - community-net

  community-service:
    build: ../community
    container_name: community-service
    ports:
      - "8081:8081"
    depends_on:
      - mysql-db
    env_file:
      - ../community/.env
    networks:
      - community-net

  product-service:
    build: ../product
    container_name: product-service
    ports:
      - "8082:8082"
    depends_on:
      - mysql-db
    env_file:
      - ../product/.env
    networks:
      - community-net

  cart-service:
    build: ../cart
    container_name: cart-service
    ports:
      - "8083:8083"
    depends_on:
      - mysql-db
    env_file:
      - ../cart/.env
    networks:
      - community-net

  order-service:
    build: ../order
    container_name: order-service
    ports:
      - "8084:8084"
    depends_on:
      - mysql-db
    env_file:
      - ../order/.env
    networks:
      - community-net

volumes:
  mysql_data:

networks:
  community-net:
